name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: sudo apt-get install -y libfuse2
      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/*.dmg

  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List files
        run: ls -lh artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          name: Baccarat Recorder ${{ github.ref_name }}
          body: |
            ## Baccarat Recorder ${{ github.ref_name }}

            | Platform | File | Instructions |
            |----------|------|--------------|
            | 🪟 Windows | `Baccarat-Recorder-Setup.exe` | Run the installer, follow the wizard |
            | 🍎 Mac | `Baccarat-Recorder.dmg` | Open DMG, drag to Applications. Right-click → Open on first launch |
            | 🐧 Linux | `Baccarat-Recorder.AppImage` | Mark as executable, double-click to run |
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
